<div class="wrapper">
    <h4>Business Information</h4>
<mat-card>
    <mat-card-header>About My Business</mat-card-header>
    <mat-card-content>
        <form>
            <mat-form-field>
                <mat-label>Business Short Intro</mat-label>
                <textarea matInput rows="5"></textarea>
            </mat-form-field>
        </form>
    </mat-card-content>
</mat-card>
<mat-card>
    <mat-card-header>Office Address</mat-card-header>
    <mat-card-content>
        <form>
            <div class="formcontainer">
            <mat-form-field>
                <mat-label>State</mat-label>
                <mat-select>
                    <mat-option>Select State</mat-option>
                    </mat-select>
            </mat-form-field>
            <mat-form-field>
                <mat-label>City</mat-label>
                <mat-select>
                    <mat-option>Select City</mat-option>
                    </mat-select>
            </mat-form-field>
            <mat-form-field>
                <mat-label>Address</mat-label>
                <input matInput placeholder="Address"/>
            </mat-form-field>
            </div>
            <div class="button_wrapper">
                <button mat-stroked-button color="primary">Cancel</button>
                <button mat-stroked-button color="accent">Save</button>
            </div>

        </form>
    </mat-card-content>
</mat-card>
</div>
