<h4>My Services</h4>
<mat-card>
    <mat-card-header>My Services/Packages</mat-card-header>
    <mat-card-content>
        <form action="">
            <div class="formwrapper">
                <mat-form-field>
                    <mat-label>Service Name</mat-label>
                    <input matInput placeholder="Service Name"/>
                </mat-form-field>
                <mat-form-field>
                    <mat-label>Price</mat-label>
                    <input matInput type="number" placeholder="Price"/>
                </mat-form-field>
                <mat-form-field>
                    <mat-label>Price Unit</mat-label>
                    <input matInput placeholder="Price Unit, EX: Per Hour,Per Head, Per Day"/>
                </mat-form-field>
                <mat-form-field>
                    <mat-label>Service Description</mat-label>
                    <input matInput placeholder="Service Short Description"/>
                </mat-form-field>
            </div>
            <div class="button_wrapper">
                <button mat-stroked-button color="primary">Cancel</button>
                <button mat-stroked-button color="accent">Save</button>
                </div>
        </form>
    </mat-card-content>
</mat-card>
<mat-card>
    <mat-card-header></mat-card-header>
    <mat-card-content>
        <table>
            <thead>
                <th>#</th>
            <th>Service Name</th>
            <th>Price</th>
            <th>Unit</th>
            <th>Description</th>
            <th>Action</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Sercie 1</td>
                <td>500</td>
                <td>Per Person</td>
                <td>delicious dinner</td>
                <td>Edit</td>
            </tr>
        </tbody>
        </table>
    </mat-card-content>
</mat-card>
