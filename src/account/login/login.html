<mat-card>
    <mat-card-header>Login</mat-card-header>
    <mat-card-content>
        <form [formGroup]="loginform!">
            <mat-form-field>
                <mat-label>User Name</mat-label>
                <input matInput placeholder="User Name" formControlName="UserName">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Password</mat-label>
                <input matInput placeholder="Password" type="password"  formControlName="Password">
            </mat-form-field>
            
            <div class="buttonwrapper">
                <button mat-stroked-button color="accent">Cancel</button>
                <button (click)="login()" mat-stroked-button color="primary">Login</button>
            </div>
            <hr>
            <div class="buttonwrapper">
                <a class="forgetpwdlink" routerLink="/">Forget Password</a>
            </div>
            <hr>
            <div class="buttonwrapper">
                <span>Don't have Account?</span>
                <a class="signuplink" routerLink="/"> <b>Signup Now</b></a>
            </div>
        </form>
    </mat-card-content>
</mat-card>
